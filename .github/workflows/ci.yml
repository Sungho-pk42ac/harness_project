name: CI

# main·feature/** 브랜치로의 push와 PR에서 품질 게이트(lint·typecheck·unit·e2e)를 실행한다.
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main, 'feature/**']

permissions:
  contents: read

# 같은 ref의 이전 실행은 취소(PR에 새 커밋 push 시 자원 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # 검사 전용(ESLint). package.json의 lint는 --fix라 CI에선 직접 호출해 변경 없이 검사만 한다.
      - name: Lint
        run: npx eslint .

      # 타입체크 + 프로덕션 빌드 (npm run build = tsc && vite build)
      - name: Typecheck & build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # 브라우저 바이너리 + 리눅스 의존성 설치(chromium만)
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts의 webServer가 db.e2e.json 시드 후 vite+json-server를 자동 기동한다
      - name: Run E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
