name: CI

# main·feature/** 브랜치로의 push와 PR에서 품질 게이트(lint·typecheck·unit·e2e)를 실행한다.
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main, 'feature/**']

permissions:
  contents: read

# 같은 ref의 이전 실행은 취소(PR에 새 커밋 push 시 자원 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # 검사 전용(ESLint). package.json의 lint는 --fix라 CI에선 직접 호출해 변경 없이 검사만 한다.
      - name: Lint
        run: npx eslint .

      # 타입체크 + 프로덕션 빌드 (npm run build = tsc && vite build)
      - name: Typecheck & build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # 브라우저 바이너리 + 리눅스 의존성 설치(chromium만)
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # 노트 백엔드용 로컬 Supabase(Postgres + PostgREST). 인증은 여전히 json-server(/users).
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase/config.toml에서 불필요 서비스를 꺼 둠 → db+rest 위주로 기동. migrations+seed.sql 자동 적용.
      - name: Start Supabase (db + rest)
        run: supabase start

      # 로컬 Supabase URL/anon 키를 VITE_*로 노출 → vite가 런타임에 주입.
      # anon 키는 기본 JWT 시크릿에서 나오는 로컬 고정 상수(공개값). auth 서비스를 꺼도 PostgREST가 검증한다.
      - name: Export Supabase env
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE" >> "$GITHUB_ENV"

      # playwright.config.ts의 webServer가 db.e2e.json(users) 시드 후 vite+json-server 기동.
      # 노트는 위에서 띄운 로컬 Supabase를 VITE_SUPABASE_* 로 사용한다.
      - name: Run E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
