name: CI

# main·feature/** 브랜치로의 push와 PR에서 품질 게이트(lint·typecheck·unit·e2e)를 실행한다.
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main, 'feature/**']

permissions:
  contents: read

# 같은 ref의 이전 실행은 취소(PR에 새 커밋 push 시 자원 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      # 검사 전용(ESLint). package.json의 lint는 --fix라 CI에선 직접 호출해 변경 없이 검사만 한다.
      - name: Lint
        run: npx eslint .

      # 타입체크 + 프로덕션 빌드 (npm run build = tsc && vite build)
      - name: Typecheck & build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      # 브라우저 바이너리 + 리눅스 의존성 설치(chromium만)
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # 노트 백엔드용 로컬 Supabase(Postgres + PostgREST). 인증은 여전히 json-server(/users).
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase/config.toml에서 불필요 서비스를 꺼 둠 → db+rest 위주로 기동. migrations+seed.sql 자동 적용.
      - name: Start Supabase (db + rest)
        run: supabase start

      # 로컬 Supabase의 실제 URL/anon 키를 status에서 읽어 VITE_*로 노출(키 추측 금지 — 인스턴스 실제 값 사용).
      - name: Export Supabase env
        run: |
          API_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')
          ANON_KEY=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2- | tr -d '"')
          SERVICE_ROLE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')
          echo "VITE_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          # service_role은 E2E 시드(데모 계정 생성)에만 쓰며 VITE_ 접두사가 없어 클라이언트 번들에 노출되지 않는다.
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "resolved API_URL=$API_URL ; ANON_KEY len=${#ANON_KEY} ; SERVICE len=${#SERVICE_ROLE_KEY}"

      # playwright webServer가 dev:e2e(데모 계정 시드 후 vite) 기동. 인증·노트 모두 로컬 Supabase 사용(json-server 제거).
      - name: Run E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
