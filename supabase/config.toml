# 로컬/CI 전용 Supabase 설정. 노트 백엔드(PostgREST + Postgres)만 필요하므로
# studio/auth/storage/realtime/edge 등은 꺼서 `supabase start`를 가볍게 한다.
# 인증은 여전히 json-server(/users)가 담당한다(다음 런에서 Supabase Auth로 이전).
project_id = "ccwork"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = false

# 앱 인증을 Supabase Auth(gotrue)로 이전(supabase-auth-rls). 로컬/CI엔 메일 서버가 없으므로
# 이메일 확인을 꺼 가입 즉시 로그인 가능하게 한다(시드 계정도 email_confirm=true로 생성 — 두 겹).
[auth]
enabled = true

[auth.email]
enable_confirmations = false

[storage]
enabled = false

[realtime]
enabled = false

[inbucket]
enabled = false

[analytics]
enabled = false

[edge_runtime]
enabled = false
